<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <!-- Car interior bg -->
    <linearGradient id="carInt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="50%" stop-color="#12121e"/>
      <stop offset="100%" stop-color="#080810"/>
    </linearGradient>
    <!-- Dashboard gradient -->
    <linearGradient id="dashGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2a"/>
      <stop offset="100%" stop-color="#0d0d18"/>
    </linearGradient>
    <!-- Windshield light (road) -->
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0f18"/>
      <stop offset="60%" stop-color="#101828"/>
      <stop offset="100%" stop-color="#1a2438"/>
    </linearGradient>
    <!-- Face skin tone -->
    <linearGradient id="skin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="50%" stop-color="#c09060"/>
      <stop offset="100%" stop-color="#a07848"/>
    </linearGradient>
    <!-- Alert red glow -->
    <radialGradient id="alertGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ff3333aa"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- EAR chart gradient -->
    <linearGradient id="earLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="60%" stop-color="#00ccaa"/>
      <stop offset="80%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#ff4444"/>
    </linearGradient>
    <linearGradient id="panelBG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080d18"/>
      <stop offset="100%" stop-color="#040810"/>
    </linearGradient>
    <filter id="glowF">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="alertFilter">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softF">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Car interior background -->
  <rect width="800" height="450" fill="url(#carInt)"/>

  <!-- === WINDSHIELD AREA (road view) === -->
  <rect x="80" y="20" width="640" height="220" rx="15" fill="url(#road)"/>
  <!-- Night road lanes -->
  <line x1="400" y1="240" x2="370" y2="20" stroke="#ffffff" stroke-width="2" opacity="0.15"/>
  <line x1="400" y1="240" x2="430" y2="20" stroke="#ffffff" stroke-width="2" opacity="0.15"/>
  <!-- Road center dashes -->
  <g fill="none" stroke="#ffff00" stroke-width="2" stroke-dasharray="20,15" opacity="0.3">
    <line x1="400" y1="20" x2="400" y2="240"/>
  </g>
  <!-- Headlight cone beams -->
  <path d="M340 240 Q330 180 260 60 Q320 80 340 240Z" fill="#ffffaa" opacity="0.04"/>
  <path d="M460 240 Q470 180 540 60 Q480 80 460 240Z" fill="#ffffaa" opacity="0.04"/>
  <!-- Road markings -->
  <rect x="238" y="200" width="30" height="5" rx="1" fill="#ffffff" opacity="0.15" transform="rotate(-5 238 200)"/>
  <rect x="238" y="175" width="25" height="4" rx="1" fill="#ffffff" opacity="0.1" transform="rotate(-5 238 175)"/>
  <rect x="530" y="200" width="30" height="5" rx="1" fill="#ffffff" opacity="0.15" transform="rotate(5 530 200)"/>
  <!-- Windshield reflection -->
  <path d="M80 20 Q200 35 400 32 Q600 35 720 20 L720 80 Q600 72 400 70 Q200 72 80 80Z" fill="#ffffff" opacity="0.025"/>
  <!-- Windshield frame -->
  <rect x="80" y="20" width="640" height="220" rx="15" fill="none" stroke="#1a2040" stroke-width="3"/>

  <!-- === FACE DETECTION OVERLAY (in windshield area) === -->
  <!-- Camera feed mini-inset (driver-facing camera) -->
  <rect x="280" y="35" width="240" height="195" rx="8" fill="#04080e" stroke="#5eead422" stroke-width="1"/>

  <!-- Face: skin -->
  <ellipse cx="400" cy="120" rx="65" ry="80" fill="url(#skin)"/>
  <!-- Forehead shadow -->
  <ellipse cx="400" cy="75" rx="50" ry="28" fill="#9a7040" opacity="0.4"/>
  <!-- Jawline definition -->
  <ellipse cx="400" cy="168" rx="42" ry="22" fill="#b88850" opacity="0.4"/>

  <!-- Hair (dark, short) -->
  <ellipse cx="400" cy="60" rx="65" ry="38" fill="#1a0e06"/>
  <ellipse cx="335" cy="80" rx="18" ry="45" fill="#1a0e06"/>
  <ellipse cx="465" cy="80" rx="18" ry="45" fill="#1a0e06"/>

  <!-- Ears -->
  <ellipse cx="335" cy="118" rx="12" ry="18" fill="#c09060"/>
  <ellipse cx="465" cy="118" rx="12" ry="18" fill="#c09060"/>
  <!-- Ear inner -->
  <ellipse cx="336" cy="118" rx="7" ry="11" fill="#a07040" opacity="0.6"/>
  <ellipse cx="464" cy="118" rx="7" ry="11" fill="#a07040" opacity="0.6"/>

  <!-- EYES - DROWSY (half closed) -->
  <!-- Left eye orbit -->
  <ellipse cx="370" cy="106" rx="22" ry="16" fill="#b07840" opacity="0.3"/>
  <!-- Left eye white -->
  <ellipse cx="370" cy="108" rx="18" ry="10" fill="#e8dcd0"/>
  <!-- Left eyelid (droopy - half closed) -->
  <path d="M352 108 Q370 100 388 108" fill="#c0944a"/>
  <!-- Left iris -->
  <circle cx="370" cy="110" r="7" fill="#3a2810"/>
  <circle cx="370" cy="110" r="4.5" fill="#1a1008"/>
  <circle cx="368" cy="108" r="1.5" fill="#ffffff" opacity="0.7"/>
  <!-- Left lower eyelid (heavy, drooping) -->
  <path d="M352 115 Q370 124 388 115" fill="#c0944a"/>

  <!-- Right eye orbit -->
  <ellipse cx="430" cy="106" rx="22" ry="16" fill="#b07840" opacity="0.3"/>
  <!-- Right eye white -->
  <ellipse cx="430" cy="108" rx="18" ry="10" fill="#e8dcd0"/>
  <!-- Right eyelid (droopy) -->
  <path d="M412 108 Q430 100 448 108" fill="#c0944a"/>
  <!-- Right iris -->
  <circle cx="430" cy="110" r="7" fill="#3a2810"/>
  <circle cx="430" cy="110" r="4.5" fill="#1a1008"/>
  <circle cx="428" cy="108" r="1.5" fill="#ffffff" opacity="0.7"/>
  <!-- Right lower eyelid (drooping - more closed) -->
  <path d="M412 113 Q430 122 448 113" fill="#c0944a"/>

  <!-- Nose -->
  <path d="M395 118 Q390 138 385 144 Q392 148 400 147 Q408 148 415 144 Q410 138 405 118Z" fill="#a87048" opacity="0.7"/>
  <!-- Nostrils -->
  <ellipse cx="390" cy="143" rx="6" ry="4" fill="#8a5028" opacity="0.6"/>
  <ellipse cx="410" cy="143" rx="6" ry="4" fill="#8a5028" opacity="0.6"/>

  <!-- Mouth (slightly ajar - drowsy) -->
  <path d="M382 158 Q400 165 418 158" stroke="#7a4028" stroke-width="2" fill="none"/>
  <ellipse cx="400" cy="164" rx="12" ry="5" fill="#5a2818" opacity="0.5"/>

  <!-- FACIAL LANDMARK DOTS (68-point detection) -->
  <g fill="#00ffcc" opacity="0.8">
    <!-- Jawline -->
    <circle cx="350" cy="168" r="2.5"/><circle cx="358" cy="182" r="2.5"/><circle cx="370" cy="192" r="2.5"/><circle cx="383" cy="198" r="2.5"/><circle cx="400" cy="200" r="2.5"/><circle cx="417" cy="198" r="2.5"/><circle cx="430" cy="192" r="2.5"/><circle cx="442" cy="182" r="2.5"/><circle cx="450" cy="168" r="2.5"/>
    <!-- Eyebrows left -->
    <circle cx="355" cy="92" r="2"/><circle cx="363" cy="88" r="2"/><circle cx="372" cy="86" r="2"/><circle cx="381" cy="88" r="2"/><circle cx="388" cy="92" r="2"/>
    <!-- Eyebrows right -->
    <circle cx="412" cy="92" r="2"/><circle cx="419" cy="88" r="2"/><circle cx="428" cy="86" r="2"/><circle cx="437" cy="88" r="2"/><circle cx="445" cy="92" r="2"/>
    <!-- Left eye -->
    <circle cx="352" cy="108" r="2"/><circle cx="360" cy="103" r="2"/><circle cx="370" cy="101" r="2"/><circle cx="380" cy="103" r="2"/><circle cx="388" cy="108" r="2"/><circle cx="380" cy="114" r="2"/><circle cx="370" cy="116" r="2"/><circle cx="360" cy="114" r="2"/>
    <!-- Right eye -->
    <circle cx="412" cy="108" r="2"/><circle cx="420" cy="103" r="2"/><circle cx="430" cy="101" r="2"/><circle cx="440" cy="103" r="2"/><circle cx="448" cy="108" r="2"/><circle cx="440" cy="114" r="2"/><circle cx="430" cy="116" r="2"/><circle cx="420" cy="114" r="2"/>
    <!-- Nose bridge -->
    <circle cx="400" cy="112" r="2"/><circle cx="400" cy="122" r="2"/><circle cx="400" cy="132" r="2"/>
    <!-- Nose base -->
    <circle cx="387" cy="140" r="2"/><circle cx="393" cy="144" r="2"/><circle cx="400" cy="146" r="2"/><circle cx="407" cy="144" r="2"/><circle cx="413" cy="140" r="2"/>
    <!-- Mouth -->
    <circle cx="384" cy="157" r="2"/><circle cx="392" cy="154" r="2"/><circle cx="400" cy="153" r="2"/><circle cx="408" cy="154" r="2"/><circle cx="416" cy="157" r="2"/>
  </g>

  <!-- EAR (Eye Aspect Ratio) measurement lines -->
  <line x1="352" y1="108" x2="388" y2="108" stroke="#ff4444" stroke-width="1.5" opacity="0.8" stroke-dasharray="3,2"/>
  <line x1="360" y1="103" x2="380" y2="114" stroke="#ff4444" stroke-width="1" opacity="0.8" stroke-dasharray="3,2"/>
  <line x1="370" y1="101" x2="370" y2="116" stroke="#ff4444" stroke-width="1" opacity="0.8" stroke-dasharray="3,2"/>
  <!-- EAR label -->
  <rect x="320" y="78" width="54" height="16" rx="2" fill="#ff000088"/>
  <text x="347" y="90" font-family="'Courier New',monospace" font-size="9" fill="#ff8888" text-anchor="middle">EAR:0.19</text>

  <!-- DROWSINESS ALERT OVERLAY -->
  <rect x="280" y="35" width="240" height="195" rx="8" fill="#ff0000" opacity="0.07"/>
  <rect x="280" y="35" width="240" height="195" rx="8" fill="none" stroke="#ff4444" stroke-width="2.5" opacity="0.7" filter="url(#alertFilter)"/>
  <!-- DROWSY label on face -->
  <rect x="305" y="207" width="190" height="20" rx="4" fill="#cc0000" opacity="0.9"/>
  <text x="400" y="221" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">⚠ DROWSINESS DETECTED</text>

  <!-- === DASHBOARD === -->
  <rect x="0" y="250" width="800" height="200" fill="url(#dashGrad)"/>
  <!-- Dashboard top curve -->
  <path d="M0 250 Q100 240 400 238 Q700 240 800 250" fill="#1a1a28" opacity="0.8"/>

  <!-- Steering wheel (visible at bottom) -->
  <circle cx="250" cy="420" r="75" fill="none" stroke="#2a2a3a" stroke-width="14"/>
  <circle cx="250" cy="420" r="20" fill="#2a2a3a"/>
  <line x1="250" y1="345" x2="250" y2="400" stroke="#2a2a3a" stroke-width="8"/>
  <line x1="175" y1="420" x2="230" y2="420" stroke="#2a2a3a" stroke-width="8"/>
  <line x1="270" y1="420" x2="325" y2="420" stroke="#2a2a3a" stroke-width="8"/>

  <!-- Instrument cluster -->
  <circle cx="400" cy="310" r="55" fill="#0a0a14" stroke="#2a2a3a" stroke-width="3"/>
  <circle cx="400" cy="310" r="50" fill="none" stroke="#1a1a28" stroke-width="1"/>
  <!-- Speed -->
  <text x="400" y="302" font-family="'Courier New',monospace" font-size="20" font-weight="bold" fill="#5eead4" text-anchor="middle" filter="url(#glowF)">72</text>
  <text x="400" y="317" font-family="'Courier New',monospace" font-size="9" fill="#40a880" text-anchor="middle">km/h</text>
  <!-- Speed arc -->
  <path d="M360 335 A50 50 0 1 1 440 335" fill="none" stroke="#1a2a20" stroke-width="6"/>
  <path d="M360 335 A50 50 0 0 1 430 280" fill="none" stroke="#5eead4" stroke-width="6" stroke-linecap="round" opacity="0.8"/>

  <!-- Alert buzzer/light indicators -->
  <!-- BUZZER -->
  <rect x="470" y="255" width="130" height="55" rx="6" fill="#1a0808" stroke="#ff444488" stroke-width="1.5"/>
  <circle cx="490" cy="278" r="8" fill="#ff4444" filter="url(#alertFilter)"/>
  <text x="505" y="268" font-family="'Courier New',monospace" font-size="10" font-weight="bold" fill="#ff6666">⚠ ALERT!</text>
  <text x="505" y="282" font-family="'Courier New',monospace" font-size="9" fill="#ff4444">BUZZER ACTIVE</text>
  <text x="505" y="296" font-family="'Courier New',monospace" font-size="8" fill="#cc3333">Arduino Mega</text>
  <text x="475" y="305" font-family="'Courier New',monospace" font-size="8" fill="#884444">T: 0.8s delay</text>

  <!-- === RIGHT PANEL: EAR Chart === -->
  <rect x="552" y="0" width="248" height="250" fill="url(#panelBG)"/>
  <rect x="552" y="0" width="1" height="250" fill="#5eead422"/>
  <text x="676" y="20" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#5eead4" text-anchor="middle" filter="url(#glowF)">EAR CHART</text>
  <text x="676" y="34" font-family="'Courier New',monospace" font-size="8" fill="#40a080" text-anchor="middle">Eye Aspect Ratio Over Time</text>

  <!-- EAR chart axes -->
  <line x1="572" y1="48" x2="572" y2="192" stroke="#334433" stroke-width="1"/>
  <line x1="572" y1="192" x2="786" y2="192" stroke="#334433" stroke-width="1"/>
  <!-- Y labels -->
  <text x="568" y="52" font-family="monospace" font-size="7" fill="#507060" text-anchor="end">0.40</text>
  <text x="568" y="92" font-family="monospace" font-size="7" fill="#507060" text-anchor="end">0.30</text>
  <text x="568" y="132" font-family="monospace" font-size="7" fill="#507060" text-anchor="end">0.20</text>
  <text x="568" y="172" font-family="monospace" font-size="7" fill="#507060" text-anchor="end">0.10</text>
  <!-- Grid lines -->
  <line x1="572" y1="92" x2="786" y2="92" stroke="#223322" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="572" y1="132" x2="786" y2="132" stroke="#223322" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="572" y1="172" x2="786" y2="172" stroke="#223322" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- EAR threshold line (0.25) -->
  <line x1="572" y1="112" x2="786" y2="112" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.75"/>
  <rect x="742" y="103" width="44" height="14" rx="2" fill="#440808"/>
  <text x="764" y="113" font-family="monospace" font-size="7.5" fill="#ff6666" text-anchor="middle">T=0.25</text>

  <!-- EAR data line (starts normal, drops) -->
  <polyline points="576,72 590,68 604,75 618,70 632,73 646,68 660,78 674,80 688,95 702,120 716,148 730,162 744,170 758,174 772,176 786,178" fill="none" stroke="url(#earLine)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Shaded area under curve -->
  <polygon points="576,192 576,72 590,68 604,75 618,70 632,73 646,68 660,78 674,80 688,95 702,120 716,148 730,162 744,170 758,174 772,176 786,178 786,192" fill="#5eead4" opacity="0.08"/>
  <!-- Red fill zone (below threshold) -->
  <polygon points="688,112 702,120 716,148 730,162 744,170 758,174 772,176 786,178 786,112" fill="#ff4444" opacity="0.1"/>

  <!-- Current EAR value -->
  <circle cx="786" cy="178" r="5" fill="#ff4444" filter="url(#glowF)"/>
  <rect x="726" y="194" width="60" height="20" rx="2" fill="#440000"/>
  <text x="756" y="207" font-family="monospace" font-size="9" fill="#ff6666" text-anchor="middle">EAR: 0.19</text>

  <!-- === Bottom Right Metrics  === -->
  <rect x="552" y="250" width="248" height="200" fill="url(#panelBG)"/>
  <line x1="552" y1="250" x2="800" y2="250" stroke="#5eead422" stroke-width="1"/>
  <text x="676" y="268" font-family="'Courier New',monospace" font-size="10" font-weight="bold" fill="#5eead4" text-anchor="middle">DRIVER MONITOR</text>

  <!-- Metrics -->
  <rect x="560" y="275" width="108" height="46" rx="4" fill="#0a1214" stroke="#5eead422" stroke-width="1"/>
  <text x="614" y="290" font-family="monospace" font-size="8" fill="#60a890" text-anchor="middle">EAR VALUE</text>
  <text x="614" y="310" font-family="monospace" font-size="17" font-weight="bold" fill="#ff5555" text-anchor="middle" filter="url(#glowF)">0.19</text>

  <rect x="682" y="275" width="108" height="46" rx="4" fill="#0a1214" stroke="#5eead422" stroke-width="1"/>
  <text x="736" y="290" font-family="monospace" font-size="8" fill="#60a890" text-anchor="middle">BLINK RATE</text>
  <text x="736" y="310" font-family="monospace" font-size="17" font-weight="bold" fill="#fbbf24" text-anchor="middle">8/min</text>

  <rect x="560" y="330" width="108" height="46" rx="4" fill="#0a1214" stroke="#5eead422" stroke-width="1"/>
  <text x="614" y="345" font-family="monospace" font-size="8" fill="#60a890" text-anchor="middle">YAWN COUNT</text>
  <text x="614" y="365" font-family="monospace" font-size="17" font-weight="bold" fill="#fbbf24" text-anchor="middle">3</text>

  <rect x="682" y="330" width="108" height="46" rx="4" fill="#160808" stroke="#ff444422" stroke-width="1"/>
  <text x="736" y="345" font-family="monospace" font-size="8" fill="#cc6060" text-anchor="middle">ALERT LEVEL</text>
  <text x="736" y="366" font-family="monospace" font-size="14" font-weight="bold" fill="#ff4444" text-anchor="middle" filter="url(#alertFilter)">HIGH ⚠</text>

  <!-- Footer status -->
  <line x1="552" y1="388" x2="800" y2="388" stroke="#5eead422" stroke-width="1"/>
  <text x="560" y="404" font-family="monospace" font-size="8" fill="#507060">OpenCV + Dlib 68-pt landmarks</text>
  <text x="560" y="418" font-family="monospace" font-size="8" fill="#507060">Arduino Mega · Buzzer · LCD</text>
  <text x="560" y="432" font-family="monospace" font-size="8" fill="#507060">EAR Threshold: 0.25 · 30 FPS</text>
  <text x="560" y="446" font-family="monospace" font-size="8" fill="#ff6666">⚠ WAKE-UP ALERT TRIGGERED</text>
</svg>
